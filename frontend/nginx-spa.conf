server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Static assets must return real 404 (not SPA fallback).
    location ~* \.(js|mjs|css|map|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
